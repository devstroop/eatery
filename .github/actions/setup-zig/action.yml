name: Setup Zig
description: Download and extract a pinned Zig version for the current runner
inputs:
  version:
    description: Zig version (e.g. 0.15.2)
    required: true
    default: "0.15.2"
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)  ZIG_ARCH="x86_64" ;;
          aarch64|arm64) ZIG_ARCH="aarch64" ;;
          *) echo "Unknown arch: $ARCH"; exit 1 ;;
        esac

        OS="${{ runner.os }}"
        case "$OS" in
          Linux)  OS_TRIPLE="linux-${ZIG_ARCH}" ;;
          macOS)  OS_TRIPLE="macos-${ZIG_ARCH}" ;;
          Windows) OS_TRIPLE="windows-x86_64" ;;
          *) echo "Unknown OS: $OS"; exit 1 ;;
        esac

        VERSION="${{ inputs.version }}"
        BASE_URL="https://ziglang.org/download/$VERSION/zig-${OS_TRIPLE}-$VERSION"

        if [ "$OS" = "Windows" ]; then
          URL="${BASE_URL}.zip"
          curl -fsSL "$URL" -o zig.zip
          unzip -q zig.zip
          echo "$PWD/zig-${OS_TRIPLE}-$VERSION" >> $GITHUB_PATH
        else
          URL="${BASE_URL}.tar.xz"
          curl -fsSL "$URL" | tar -xJ
          echo "$PWD/zig-${OS_TRIPLE}-$VERSION" >> $GITHUB_PATH
        fi
