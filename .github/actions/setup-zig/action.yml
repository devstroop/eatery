name: Setup Zig
description: Download and extract a pinned Zig version for the current runner
inputs:
  version:
    description: Zig version (e.g. 0.15.2)
    required: true
    default: "0.15.2"
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        # ── Detect architecture ───────────────────────────────────
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)  ZIG_ARCH="x86_64" ;;
          aarch64|arm64) ZIG_ARCH="aarch64" ;;
          *) echo "::error ::Unsupported arch: $ARCH"; exit 1 ;;
        esac

        # ── Detect OS ─────────────────────────────────────────────
        # Use uname instead of ${{ runner.os }} for portability.
        UNAME_S="$(uname -s)"
        case "$UNAME_S" in
          Linux)  ZIG_OS="linux" ;;
          Darwin) ZIG_OS="macos" ;;
          MINGW*|MSYS*|CYGWIN*) ZIG_OS="windows" ;;
          *) echo "::error ::Unsupported OS: $UNAME_S"; exit 1 ;;
        esac

        # Windows builds are only published for x86_64.
        if [ "$ZIG_OS" = "windows" ]; then
          ZIG_ARCH="x86_64"
        fi

        # ── Download & extract ────────────────────────────────────
        VERSION="${{ inputs.version }}"
        BASE_URL="https://ziglang.org/download/$VERSION/zig-${ZIG_ARCH}-${ZIG_OS}-$VERSION"

        if [ "$ZIG_OS" = "windows" ]; then
          URL="${BASE_URL}.zip"
          curl -fsSL "$URL" -o zig.zip
          unzip -q zig.zip
          echo "$PWD/zig-${ZIG_ARCH}-${ZIG_OS}-$VERSION" >> $GITHUB_PATH
        else
          URL="${BASE_URL}.tar.xz"
          curl -fsSL "$URL" | tar -xJ
          echo "$PWD/zig-${ZIG_ARCH}-${ZIG_OS}-$VERSION" >> $GITHUB_PATH
        fi
