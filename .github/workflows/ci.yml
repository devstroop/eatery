name: Eatery CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings lib/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests (root)
        run: |
          flutter test test/order_calculations_test.dart \
                    test/router_regression_test.dart \
                    test/data/database/eatery_store_test.dart \
                    test/data/database/eatery_store_isolate_test.dart

      - name: Run core tests
        run: flutter test packages/eatery_core/test/

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        # Native lib is cross-compiled by Gradle's buildEateryStore task
        run: flutter build apk --debug

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Install Zig
        run: brew install zig

      - name: Get dependencies
        run: flutter pub get

      - name: Build native library
        run: cd libeaterystore && zig build shared-lib && cd ..

      - name: Build iOS
        run: flutter build ios --no-codesign

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Install Zig
        run: brew install zig

      - name: Get dependencies
        run: flutter pub get

      - name: Build native library
        run: cd libeaterystore && zig build shared-lib && cd ..

      - name: Build macOS
        run: flutter build macos --debug

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Install Zig
        run: |
          wget -q https://ziglang.org/download/0.15.0/zig-linux-x86_64-0.15.0.tar.xz
          tar -xf zig-linux-x86_64-0.15.0.tar.xz
          echo "$PWD/zig-linux-x86_64-0.15.0" >> $GITHUB_PATH

      - name: Get dependencies
        run: flutter pub get

      - name: Build native library
        run: cd libeaterystore && zig build shared-lib && cd ..

      - name: Build Linux
        run: flutter build linux --debug

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Install Zig
        run: |
          Invoke-WebRequest -Uri https://ziglang.org/download/0.15.0/zig-windows-x86_64-0.15.0.zip -OutFile zig.zip
          Expand-Archive zig.zip -DestinationPath .
          echo "$pwd/zig-windows-x86_64-0.15.0" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get dependencies
        run: flutter pub get

      - name: Build native library
        run: cd libeaterystore && zig build shared-lib && cd ..

      - name: Build Windows
        run: flutter build windows --debug
