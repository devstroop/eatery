name: Eatery CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.15.2"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings lib/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - uses: ./.github/actions/setup-zig
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build native library
        run: cd libeaterystore && zig build shared-lib && cd ..

      - name: Run all tests
        run: flutter test

      - name: Run core package tests
        run: flutter test packages/eatery_core/test/

  build:
    name: ${{ matrix.target }}
    needs: [analyze, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android
            os: ubuntu-latest
            build-cmd: flutter build apk --debug
            build-native: true
          - target: linux
            os: ubuntu-latest
            build-cmd: flutter build linux --debug
            build-native: true
          - target: macos
            os: macos-15
            build-cmd: flutter build macos --debug
            build-native: true
          - target: windows
            os: windows-latest
            build-cmd: flutter build windows --debug
            build-native: true
          - target: ios
            os: macos-latest
            build-cmd: flutter build ios --no-codesign
            # iOS: build native static library via cross-compilation.
            # GitHub macOS runners include Xcode with the iOS SDK.
            # setupIosSdk() in build.zig reads IOS_SDK_PATH from the env
            # and adds both include and library paths so linkLibC (called by
            # configure() for all targets) can find iOS platform files.
            build-native: true
            native-lib-type: static-lib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Install Linux dependencies
        if: ${{ matrix.target == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            liblzma-dev \
            libsecret-1-dev \
            ninja-build \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - name: Get dependencies
        run: flutter pub get

      - name: Setup Zig
        if: ${{ matrix.build-native }}
        uses: ./.github/actions/setup-zig
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build native library
        if: ${{ matrix.build-native }}
        shell: bash
        run: |
          cd libeaterystore
          LIB_TYPE="${{ matrix.native-lib-type || 'shared-lib' }}"

          if [ "${{ matrix.target }}" = "ios" ]; then
            # iOS: cross-compile static library for aarch64.
            # Set IOS_SDK_PATH so setupIosSdk() in build.zig can find SDK
            # headers and libc .tbd files for linkLibC.
            export IOS_SDK_PATH="$(xcrun --sdk iphoneos --show-sdk-path)"
            echo "::debug::IOS_SDK_PATH=$IOS_SDK_PATH"
            zig build "$LIB_TYPE" -Dtarget=aarch64-ios

          elif [ "${{ matrix.target }}" = "android" ] || [ "${{ matrix.target }}" = "android-appbundle" ]; then
            # Android: build shared lib for all 4 ABIs and place in jniLibs
            resolve_ndk() {
              if [ -n "${ANDROID_NDK_HOME:-}" ] && [ -d "$ANDROID_NDK_HOME" ]; then
                return
              fi
              local sdk_root="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
              shopt -s nullglob
              local ndk_dirs=("$sdk_root/ndk/"*)
              shopt -u nullglob
              for candidate in "${ndk_dirs[@]}"; do
                if [ -d "$candidate" ]; then
                  export ANDROID_NDK_HOME="$candidate"
                  echo "::debug::Resolved ANDROID_NDK_HOME=$candidate"
                  return
                fi
              done
              echo "::warning::ANDROID_NDK_HOME not set and no NDK found under $sdk_root/ndk/"
            }
            resolve_ndk

            ANDROID_ABIS=(
              "aarch64-linux-android:arm64-v8a"
              "arm-linux-androideabi:armeabi-v7a"
              "x86_64-linux-android:x86_64"
              # x86 (32-bit) excluded: setupAndroidNdk() in build.zig only
              # supports aarch64, arm, and x86_64. x86 hits the
              # "Unsupported Android arch" error (build.zig:195).
            )
            BUILD_TMP="$(mktemp -d)"
            for entry in "${ANDROID_ABIS[@]}"; do
              ZIG_TARGET="${entry%%:*}"
              JNI_ABI="${entry#*:}"
              echo "::group::Building native lib for $ZIG_TARGET ($JNI_ABI)"
              # Use scripts/build.sh from repo root if available
              if [ -x "../scripts/build.sh" ]; then
                if ! "../scripts/build.sh" "$LIB_TYPE" "$ZIG_TARGET"; then
                  echo "::error::Build failed for $ZIG_TARGET"
                  exit 1
                fi
              else
                if ! zig build "$LIB_TYPE" -Dtarget="$ZIG_TARGET" --prefix "$BUILD_TMP/$JNI_ABI"; then
                  echo "::error::zig build failed for $ZIG_TARGET"
                  exit 1
                fi
              fi
              JNI_DIR="../android/app/src/main/jniLibs/$JNI_ABI"
              mkdir -p "$JNI_DIR"
              SOURCE="$BUILD_TMP/$JNI_ABI/libeaterystore.so"
              if [ ! -f "$SOURCE" ]; then
                # Shared lib may be at lib/ subdir
                SOURCE="$BUILD_TMP/$JNI_ABI/lib/libeaterystore.so"
              fi
              if [ -f "$SOURCE" ]; then
                cp -f "$SOURCE" "$JNI_DIR/"
                echo "::debug::Copied $SOURCE → $JNI_DIR/"
              else
                echo "::error::libeaterystore.so not found for $ZIG_TARGET"
                exit 1
              fi
              echo "::endgroup::"
            done
            rm -rf "$BUILD_TMP"

          else
            # Desktop: build shared lib for native host
            zig build "$LIB_TYPE"
          fi
          cd ..

      - name: Build ${{ matrix.target }}
        run: ${{ matrix.build-cmd }}
