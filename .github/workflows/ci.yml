name: Eatery CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZIG_VERSION: "0.15.2"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings lib/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - uses: ./.github/actions/setup-zig
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build native library
        run: cd libeaterystore && zig build shared-lib && cd ..

      - name: Run all tests
        run: flutter test

      - name: Run core package tests
        run: flutter test packages/eatery_core/test/

  build:
    needs: [analyze, test]
    strategy:
      matrix:
        include:
          - target: android
            os: ubuntu-latest
            build-cmd: flutter build apk --debug
          - target: linux
            os: ubuntu-latest
            build-cmd: flutter build linux --debug
          - target: ios
            os: macos-latest
            build-cmd: flutter build ios --no-codesign
          - target: macos
            os: macos-latest
            build-cmd: flutter build macos --debug
          - target: windows
            os: windows-latest
            build-cmd: flutter build windows --debug
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - uses: ./.github/actions/setup-zig
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build native library
        run: cd libeaterystore && zig build shared-lib && cd ..

      - name: Build ${{ matrix.target }}
        run: ${{ matrix.build-cmd }}
