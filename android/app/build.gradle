plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace 'com.devstroop.eatery'
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.devstroop.eatery"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Update with release signing key.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug

        }
    }
}

flutter {
    source '../..'
}

// ---------------------------------------------------------------------------
// libeaterystore (Zig + embedded SQLite) native library.
//
// Cross-compiles libeaterystore.so for each Android ABI with Zig, using the
// NDK that Gradle already resolved (android.ndkDirectory), and drops the
// results into src/main/jniLibs/<abi>/ so AGP packs them into the APK. The
// Dart FFI loader then opens "libeaterystore.so" from the app's native lib dir.
// ---------------------------------------------------------------------------
def eateryStoreDir = file("${projectDir}/../../libeaterystore")
def eateryStoreAbis = [
    'arm64-v8a'  : 'aarch64-linux-android',
    'armeabi-v7a': 'arm-linux-androideabi',
    'x86_64'     : 'x86_64-linux-android',
]

tasks.register('buildEateryStore') {
    description 'Cross-compiles libeaterystore.so for all Android ABIs via Zig.'
    doLast {
        def zigOk = false
        try {
            def probe = ['zig', 'version'].execute()
            probe.waitFor()
            zigOk = probe.exitValue() == 0
        } catch (ignored) {
            zigOk = false
        }
        if (!zigOk) {
            throw new GradleException(
                "Zig not found on PATH. Install Zig 0.15.x to build libeaterystore " +
                "(see libeaterystore/README.md).")
        }

        def jniLibsDir = file("${projectDir}/src/main/jniLibs")
        def apiLevel = android.defaultConfig.minSdkVersion.apiLevel.toString()
        eateryStoreAbis.each { abi, zigTarget ->
            exec {
                workingDir eateryStoreDir
                environment 'ANDROID_NDK_HOME', android.ndkDirectory.absolutePath
                environment 'ANDROID_API_LEVEL', apiLevel
                commandLine 'zig', 'build', 'shared-lib',
                    "-Dtarget=${zigTarget}", '--release=fast'
            }
            copy {
                from new File(eateryStoreDir, 'zig-out/lib/libeaterystore.so')
                into new File(jniLibsDir, abi)
            }
        }
    }
}

tasks.matching { it.name == 'preBuild' }.configureEach {
    dependsOn 'buildEateryStore'
}
