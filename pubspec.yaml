name: eatery
description: A simple and sober restaurant management with pos application.

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # hive database
  fast_cached_network_image: ^1.2.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  mime: ^1.0.5
  path: ^1.9.0
  uicons: ^1.0.1
  flutter_bluetooth_basic: ^0.1.7
  flutter_native_splash: ^2.4.1
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  file_picker: ^8.0.6
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  platform_device_id:
    git:
      url: "https://github.com/devstroop/platform_device_id.git"
      ref: 'main'
  archive: ^3.6.1
  encrypt: ^5.0.3
  path_provider: ^2.1.3
  image_picker: ^1.1.2
  sn_progress_dialog: ^1.1.4
  excel: ^4.0.3
  flutter_file_dialog: ^3.0.2
  qrscan: ^0.3.3
  flutter_share: ^2.0.0
  number_to_words: ^1.0.0
  url_launcher: ^6.3.0
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  flutter_secure_storage: ^9.2.2
  clipboard: ^0.1.3
  http: ^1.2.1
  shared_preferences: ^2.2.3
  currency_picker: ^2.0.21
  permission_handler: ^11.3.1
  lottie: ^3.1.2
  flutter_slidable: ^3.1.1
  devdart_windows_hdsn: ^0.0.2
  hex: ^0.2.0
  external_path: ^1.0.3
  fluttertoast: ^8.2.6
  gbk_codec: ^0.4.0
  # bluetooth esc printer
  # bluetooth_thermal_printer:
    # path: ../bluetooth_thermal_printer
    # git:
      # url: 'https://github.com/devstroop/bluetooth_thermal_printer.git'
      # ref: 'master'
  flutter_riverpod: ^2.6.1
  go_router: ^17.3.0
  riverpod_annotation: ^2.6.1
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: any
  hive_generator: ^2.0.1
  flutter_lints: ^4.0.0

flutter_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/icon.png"


flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/lottie/
